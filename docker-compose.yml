version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yolo-backend
    ports:
      - "${BACKEND_PORT:-1693}:${BACKEND_PORT_CONTAINER:-5000}"
    environment:
      - PORT=${BACKEND_PORT_CONTAINER:-5000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yolo-frontend
    ports:
      - "${FRONTEND_PORT:-1660}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
